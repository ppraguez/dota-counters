name: Deploy site

# Builds the static frontend and publishes it to GitHub Pages. Runs whenever the data or the
# frontend changes (so a data refresh commit auto-redeploys), plus on manual trigger.
# To use this: in the repo Settings -> Pages, set "Source" to "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "data/heroData.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build (copies ../data/heroData.json into the bundle, then vite build)
        working-directory: frontend
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
